<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Map — Aethermourne</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f1318; font-family: 'Source Sans Pro', -apple-system, sans-serif; }
    #map { width: 100%; height: 100vh; }

    .leaflet-container { background: #0f1318; }
    .leaflet-control-zoom a {
      background: rgba(15,14,13,0.9) !important;
      color: #c4864a !important;
      border-color: #2a2725 !important;
    }
    .leaflet-control-zoom a:hover { background: rgba(30,28,26,0.95) !important; }
    .leaflet-control-attribution {
      background: rgba(15,14,13,0.8) !important;
      color: #5c5550 !important;
      font-size: 10px;
    }
    .leaflet-control-attribution a { color: #c4864a !important; }
    .leaflet-control-layers {
      background: rgba(15,14,13,0.9) !important;
      border: 1px solid #2a2725 !important;
      color: #ccc4bb !important;
      border-radius: 6px !important;
    }
    .leaflet-control-layers label { color: #ccc4bb !important; }

    .region-label {
      font-size: 13px;
      font-weight: 700;
      color: #e8e0d6;
      text-shadow: 0 1px 3px rgba(0,0,0,0.9), 0 0 10px rgba(0,0,0,0.7);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      white-space: nowrap;
      text-align: center;
    }
    .region-god {
      font-size: 9px;
      font-weight: 400;
      color: #c4864a;
      text-shadow: 0 1px 3px rgba(0,0,0,0.9);
      white-space: nowrap;
      letter-spacing: 0.04em;
      text-align: center;
      margin-top: 2px;
    }
    .settlement-label {
      font-size: 11px;
      color: #e8e0d6;
      text-shadow: 0 1px 2px rgba(0,0,0,0.9), 0 0 6px rgba(0,0,0,0.7);
      white-space: nowrap;
    }
    .settlement-label.capital { font-weight: 700; font-size: 12px; }
    .landmark-label {
      font-size: 10px;
      font-style: italic;
      color: #7a9468;
      text-shadow: 0 1px 3px rgba(0,0,0,0.9);
      white-space: nowrap;
    }
    .sea-label {
      font-size: 12px;
      font-style: italic;
      color: #3a5a7c;
      text-shadow: 0 0 6px rgba(0,0,0,0.8);
      letter-spacing: 0.3em;
      white-space: nowrap;
    }

    .leaflet-popup-content-wrapper {
      background: rgba(15,14,13,0.95) !important;
      color: #e8e0d6 !important;
      border: 1px solid #2a2725;
      border-radius: 6px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    .leaflet-popup-tip { background: rgba(15,14,13,0.95) !important; }
    .leaflet-popup-content { font-family: 'Source Sans Pro', sans-serif; font-size: 13px; line-height: 1.5; margin: 10px 14px; }
    .popup-title { font-size: 15px; font-weight: 700; color: #c4864a; margin-bottom: 2px; }
    .popup-sub { font-size: 11px; color: #5c5550; margin-bottom: 6px; }
    .popup-desc { margin-bottom: 6px; }
    .popup-meta { font-size: 11px; color: #5c5550; }

    .map-title {
      position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
      z-index: 1000; text-align: center; pointer-events: none;
    }
    .map-title h1 {
      font-size: 18px; font-weight: 700; color: #c4864a;
      letter-spacing: 0.25em; text-transform: uppercase;
      text-shadow: 0 0 20px rgba(0,0,0,0.9); margin: 0;
    }
    .map-title p { font-size: 10px; color: #5c5550; letter-spacing: 0.15em; margin: 2px 0 0; }
    .back-link {
      position: fixed; top: 12px; left: 12px; z-index: 1000;
      background: rgba(15,14,13,0.9); border: 1px solid #2a2725;
      color: #c4864a; padding: 6px 14px; border-radius: 4px;
      text-decoration: none; font-size: 12px; font-weight: 600; font-family: inherit;
    }
    .back-link:hover { background: rgba(30,28,26,0.95); border-color: #c4864a; }
  </style>
</head>
<body>
  <a href="/" class="back-link">&larr; Back to site</a>
  <div class="map-title">
    <h1>Aethermourne</h1>
    <p>A world built on the bones of dead gods</p>
  </div>
  <div id="map"></div>

  <script>
    // Data: [y, x] where y=0 is north, y increases south.
    // Leaflet Simple CRS: [lat, lng] where lat increases upward.
    // Flip y: large data-y (south) → small lat (bottom of screen).
    const MAX_Y = 1000;
    function p(coord) { return [MAX_Y - coord[0], coord[1]]; }
    function ps(coords) { return coords.map(p); }

    const map = L.map('map', {
      crs: L.CRS.Simple,
      minZoom: -1.5,
      maxZoom: 3,
      zoomSnap: 0.25,
      zoomDelta: 0.5,
    });

    // Fit to show full map: north (y=0) at top, south (y=1000) at bottom
    map.fitBounds([[MAX_Y, 0], [0, 1400]]);
    map.attributionControl.setPrefix('Aethermourne');

    fetch('/map/map-data.json')
      .then(r => r.json())
      .then(renderMap)
      .catch(e => console.error('Failed to load map data:', e));

    function renderMap(data) {
      // ── Ocean background ──────────────────────────
      L.rectangle([[MAX_Y + 500, -500], [-500, 2000]], {
        fillColor: '#0f1318', fillOpacity: 1, stroke: false, interactive: false
      }).addTo(map);

      // ── Continent landmass ────────────────────────
      const landGroup = L.layerGroup().addTo(map);

      if (data.continent && data.continent.outline) {
        L.polygon(ps(data.continent.outline), {
          color: '#2a2520', fillColor: '#1a1815', fillOpacity: 1,
          weight: 2, opacity: 0.6, interactive: false
        }).addTo(landGroup);
      }
      if (data.unwrittenLands && data.unwrittenLands.outline) {
        L.polygon(ps(data.unwrittenLands.outline), {
          color: '#2a2520', fillColor: '#1a1815', fillOpacity: 1,
          weight: 2, opacity: 0.6, interactive: false
        }).addTo(landGroup);
      }

      // ── Regions ───────────────────────────────────
      const regionsGroup = L.layerGroup().addTo(map);
      const labelsGroup = L.layerGroup().addTo(map);

      for (const r of data.regions) {
        const poly = L.polygon(ps(r.polygon), {
          color: r.color, fillColor: r.color,
          fillOpacity: 0.3, weight: 1.5, opacity: 0.7,
        }).addTo(regionsGroup);

        poly.bindPopup(`
          <div class="popup-title">${r.name}</div>
          <div class="popup-sub">${r.god}</div>
          <div class="popup-desc">${r.terrain}</div>
          <div class="popup-meta">Capital: ${r.capital} &middot; Pop: ${r.population}</div>
        `, { maxWidth: 280 });

        // Region label
        const lp = r.labelPos ? p(r.labelPos) : poly.getBounds().getCenter();
        const shortName = r.name.replace(/^The /, '');
        L.marker(lp, {
          icon: L.divIcon({
            className: '',
            html: `<div class="region-label">${shortName}</div><div class="region-god">${r.god.split(',')[0]}</div>`,
            iconSize: [200, 40], iconAnchor: [100, 20],
          }), interactive: false, pane: 'tooltipPane'
        }).addTo(labelsGroup);
      }

      // ── Landmarks ─────────────────────────────────
      const landmarksGroup = L.layerGroup().addTo(map);

      for (const lm of data.landmarks) {
        if (lm.type === 'mountains' && lm.points) {
          L.polyline(ps(lm.points), {
            color: '#5c5550', weight: 3, opacity: 0.5,
            dashArray: '6, 4', interactive: false
          }).addTo(landmarksGroup);
          const mid = ps(lm.points)[Math.floor(lm.points.length / 2)];
          L.marker(mid, {
            icon: L.divIcon({ className: 'landmark-label', html: lm.name, iconSize: [150, 16], iconAnchor: [75, 8] }),
            interactive: false
          }).addTo(landmarksGroup);
        }

        if (lm.type === 'trench' && lm.points) {
          L.polyline(ps(lm.points), {
            color: '#1a2a3a', weight: 4, opacity: 0.7,
            dashArray: '10, 6', interactive: false
          }).addTo(landmarksGroup);
          const mid = ps(lm.points)[Math.floor(lm.points.length / 2)];
          L.marker(mid, {
            icon: L.divIcon({ className: 'landmark-label', html: lm.name, iconSize: [150, 16], iconAnchor: [75, 8] }),
            interactive: false
          }).addTo(landmarksGroup);
        }

        if (lm.type === 'wall' && lm.points) {
          L.polyline(ps(lm.points), {
            color: '#6b5a3a', weight: 2, opacity: 0.7,
            dashArray: '3, 3', interactive: false
          }).addTo(landmarksGroup);
        }

        if ((lm.type === 'crater' || lm.type === 'vortex') && lm.position) {
          L.circle(p(lm.position), {
            radius: lm.radius || 20,
            color: lm.type === 'vortex' ? '#6b3fa0' : '#5c5550',
            fillColor: lm.type === 'vortex' ? '#2a1540' : '#1a1815',
            fillOpacity: 0.5, weight: 2, dashArray: '5, 3', interactive: false
          }).addTo(landmarksGroup);
          L.marker(p(lm.position), {
            icon: L.divIcon({ className: 'landmark-label', html: lm.name, iconSize: [140, 16], iconAnchor: [70, -12] }),
            interactive: false
          }).addTo(landmarksGroup);
        }

        if (lm.type === 'label' && lm.position) {
          L.marker(p(lm.position), {
            icon: L.divIcon({ className: 'sea-label', html: lm.name, iconSize: [200, 20], iconAnchor: [100, 10] }),
            interactive: false
          }).addTo(landmarksGroup);
        }
      }

      // ── Settlements ───────────────────────────────
      const settlementsGroup = L.layerGroup().addTo(map);

      for (const s of data.settlements) {
        const isCap = s.type === 'capital';
        const region = data.regions.find(r => r.id === s.region);
        const color = region ? region.color : '#c4864a';
        const size = isCap ? 8 : 5;

        const marker = L.circleMarker(p(s.position), {
          radius: size, color: '#e8e0d6', fillColor: color,
          fillOpacity: 0.9, weight: isCap ? 2 : 1.5,
        }).addTo(settlementsGroup);

        marker.bindPopup(`
          <div class="popup-title">${s.name}</div>
          <div class="popup-sub">${region ? region.name : ''}</div>
          <div class="popup-desc">${s.description}</div>
          ${s.population ? `<div class="popup-meta">Population: ${s.population.toLocaleString()}</div>` : ''}
        `, { maxWidth: 250 });

        // Settlement name label
        L.marker([p(s.position)[0] - 10, p(s.position)[1] + 12], {
          icon: L.divIcon({
            className: `settlement-label ${isCap ? 'capital' : ''}`,
            html: s.name, iconSize: [120, 16], iconAnchor: [0, 8],
          }), interactive: false
        }).addTo(settlementsGroup);
      }

      // ── Layer control ─────────────────────────────
      L.control.layers(null, {
        'Regions': regionsGroup,
        'Labels': labelsGroup,
        'Landmarks': landmarksGroup,
        'Settlements': settlementsGroup,
      }, { position: 'topright', collapsed: false }).addTo(map);
    }
  </script>
</body>
</html>
